services:
  app:
    container_name: rag-local
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - PYTHONUNBUFFERED=1
    volumes:
      - ./docs:/app/docs
      - ./chroma_db:/app/chroma_db
    extra_hosts:
      - "host.docker.internal:host-gateway"
